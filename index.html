<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect 4</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #f7f8fc 0%, #c3cfe2 100%);
    }
    #board {
  display: grid;
  grid-gap: 10px;
  margin-bottom: 20px;
  background-color: red;   /* changing background color to red */
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
}
    .cell {
      width: 80px;
      height: 80px;
      background-color: #f0f8ff;
      border-radius: 50%;
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s ease, background-color 0.3s ease;
    }
    .cell.player {
      /* Changed player chip color to green */
      background: radial-gradient(circle at top left, #0db14b, #006400);
    }
    .cell.computer {
      background: radial-gradient(circle at top left, #3498db, #2980b9);
    }
    .cell:not(.player):not(.computer):hover {
      transform: scale(1.1);
      cursor: pointer;
    }
    #message {
      font-size: 1.4em;
      color: #333333;
      height: 1.4em;
      margin-bottom: 10px;
    }
    #restart {
      padding: 10px 20px;
      font-size: 1em;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    #restart:hover {
      background-color: #218838;
    }
    h1 {
      color: #333333;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Connect 4</h1>
  <div id="game-mode-selector">
    <input type="radio" id="pvc" name="gameMode" value="pvc" checked>
    <label for="pvc">Player vs. Computer</label>
    <input type="radio" id="pvp" name="gameMode" value="pvp">
    <label for="pvp">Player vs. Player</label>
  </div>
  <div id="board"></div>
  <div id="message"></div>
  <button id="restart">Restart</button>
  <script src="public/script.js"></script>
</body>
</html>
